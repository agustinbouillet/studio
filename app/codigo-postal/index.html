<!-- SCRIPTS -->
<script>
headStyle('s', `.select2 {border: solid 1px #555 !important;}`);
    
const SERVICE = 'https://api.bouillet.com.ar/api/v1/cpa/';

function getMap(province, cpa){
    // init
    (async() => {
        const prov = String(province).replace(/ar-/i, '').toLowerCase();
        const entries = await fetch_json( `${SERVICE}${prov}` ); 

        // map options
        const options = {
            scope: "poncho-map",
            title: "name_depto",
            id: "postal",
            marker: "azul",
            slider: false,
            hash: true,
            headers: {
                postal: "Código postal"
            },
            theme_map: "dark",
            theme_ui: "relax",
            template_structure : {  
                "values": ["postal"]
            }
        };

        try {
            pm.map.remove();
            pm = null;
        } catch (error) {
            console.error("no se puede iniciar")   
        }

        // render map
        const pm = new PonchoMapFilter(entries, options);
        pm.render();
        pm.fitBounds();
        
        // Buscador
        const search_options = {
            "scope": "poncho-map-search", 
            "datalist": false,
            "placeholder": "Buscar código postal",
            "search_fields": ["postal","name_depto"]
        };
        const search = new PonchoMapSearch(pm, search_options);
        search.render();

        if(cpa.trim() != "0"){
            search.searchTerm(cpa);
        }
    })();
}
</script>
<!-- / SCRIPTS -->

<!-- scripts -->
<script>
function setSelect(data){
    const elem = document.querySelector("#locality");
    if(!elem){
        console.error("No se puede encontrar #locality");
        return;
    }
    elem.innerHTML = "";
    data.forEach(([id, province, name, partido]) => {
        const option = document.createElement("option");
        option.value = id;
        const partidoName = partido != name ? partido : false;
        option.textContent = [name, partidoName].filter(Boolean).join(" – ");

        elem.appendChild(option);
    });
}


function retriveCPA(){
    const displayResult = document.querySelector("#result");
    if(!displayResult){
        console.error("No se puede encontrar #result");
        return;
    }
    displayResult.innerHTML = "";

    const form = document.querySelector("form");
    const formData = new FormData(form);

    var object = {};
    formData.forEach((value, key) => object[key] = value);
    const {province, locality, street, number} = object;

    (async () => {
        const url = `${SERVICE}${province}/${locality}/${street}/${number}`;
        const googlesheetData = await fetch_json(url);
        displayResult.innerHTML = `<h2>CPA: ${googlesheetData.cpa}</h2>`;
        getMap(province, googlesheetData.cp);
    })();
}


// Init
(async () => {
    const gapi = new GapiSheetData();
    let url = gapi.url( "dataset", "1B9GE2OhnAxGvAmw8wDBqPdD41auHpUoviNgvMW_SR9s");
    url = `${SERVICE}localities`;
    const googlesheetData = await fetch_json(url);
    let {values} = googlesheetData;

    // Default AR-C
    const data = values.filter(entry => entry[1] == "AR-C")
    setSelect(data);
    $('.js-example-basic-single').select2({width: '100%'});
    getMap("c", "0");

    const selectProvince = document.querySelector("#province");
    selectProvince.addEventListener("change", (e) => {
        const province = e.target.value;
        const data = values.filter(entry => entry[1] == province)
        setSelect(data);

        $('.js-example-basic-single').select2({width: '100%'});
    });

})();


const submit = document.querySelector("#submit");
submit.addEventListener("click", async (e) => {
    e.preventDefault();
    retriveCPA();
});


$(document).ready(function() {
    $('.js-example-basic-single').select2({width: '100%'});
});
</script>

</body>
