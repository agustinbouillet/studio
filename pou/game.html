<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Document</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: sans-serif;
        }

        body {
            background-image: url('./fondo.jpeg');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        #imagen {
            position: absolute;
            width: 60px;
            height: 60px;
            z-index: 10;
            transition: .15s;
        }

        #puntaje {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 22px;
            font-weight: bold;
            background: rgba(255,255,255,0.85);
            padding: 6px 16px;
            border-radius: 8px;
            z-index: 100;
            white-space: nowrap;
        }

        /* Pantalla de selección de nivel */
        #pantalla-nivel {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            z-index: 300;
        }

        #pantalla-nivel h1 {
            font-size: 32px;
            margin: 0 0 12px;
            text-align: center;
            padding: 0 16px;
        }

        #pantalla-nivel button {
            font-size: 18px;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            width: min(280px, 80vw);
            font-weight: bold;
            transition: transform .1s;
        }

        #pantalla-nivel button:active { transform: scale(0.96); }
        #btn-facil   { background: #4caf50; color: white; }
        #btn-medio   { background: #ff9800; color: white; }
        #btn-dificil { background: #f44336; color: white; }

        #mensaje {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            color: white;
            font-size: clamp(24px, 6vw, 40px);
            font-weight: bold;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 16px;
            z-index: 200;
            text-align: center;
            padding: 24px;
        }

        #mensaje button {
            font-size: 16px;
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: white;
            color: black;
        }

        .circulo {
            position: absolute;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 4px solid rebeccapurple;
            z-index: 5;
        }

        .circulo.peligro {
            border-color: red;
            background: rgba(255, 0, 0, 0.3);
        }

        .circulo.activo {
            background: rgba(255, 220, 0, 0.6);
        }

        /* ── Controles: portrait (abajo centrado) ── */
        #controles {
            position: fixed;
            z-index: 100;
            display: none; /* se muestra con JS */
        }

        #controles button {
            width: 60px;
            height: 60px;
            font-size: 26px;
            border: none;
            border-radius: 12px;
            background: rgba(255,255,255,0.75);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        #controles button:active { background: rgba(255,255,255,0.95); }

        /* portrait */
        @media (orientation: portrait) {
            #controles {
                bottom: max(24px, env(safe-area-inset-bottom));
                left: 50%;
                transform: translateX(-50%);
                display: grid;
                grid-template-columns: repeat(3, 60px);
                grid-template-rows: repeat(3, 60px);
                gap: 6px;
            }

            #btn-arriba { grid-column: 2; grid-row: 1; }
            #btn-izq    { grid-column: 1; grid-row: 2; }
            #btn-der    { grid-column: 3; grid-row: 2; }
            #btn-abajo  { grid-column: 2; grid-row: 3; }
        }

        /* landscape: izq/der a la izquierda, arriba/abajo a la derecha */
        @media (orientation: landscape) {
            #controles {
                /* usamos dos columnas separadas: left-pad y right-pad */
                /* los botones se posicionan con elementos individuales */
                display: block;
                inset: 0;
                pointer-events: none;
                background: transparent;
            }

            #controles button {
                position: fixed;
                pointer-events: all;
            }

            /* Izquierda: botones ◀ y ▶ apilados verticalmente al borde izq */
            #btn-izq {
                left: max(12px, env(safe-area-inset-left));
                top: calc(50% - 66px);
            }
            #btn-der {
                left: max(12px, env(safe-area-inset-left));
                top: calc(50% + 6px);
            }

            /* Derecha: botones ▲ y ▼ apilados verticalmente al borde der */
            #btn-arriba {
                right: max(12px, env(safe-area-inset-right));
                top: calc(50% - 66px);
            }
            #btn-abajo {
                right: max(12px, env(safe-area-inset-right));
                top: calc(50% + 6px);
            }
        }
    </style>
</head>
<body>
    <div id="pantalla-nivel">
        <h1>Elegí tu nivel</h1>
        <button id="btn-facil"   onclick="iniciarJuego(4)">Primer &nbsp;💣💣💣💣</button>
        <button id="btn-medio"   onclick="iniciarJuego(2)">Medio &nbsp;💣💣</button>
        <button id="btn-dificil" onclick="iniciarJuego(1)">Ah, sos re bot &nbsp;💣</button>
    </div>

    <div id="puntaje" style="display:none">Puntos: 0</div>

    <div id="mensaje">
        <span id="texto-mensaje"></span>
        <button onclick="volverAlMenu()">Cambiar nivel</button>
        <button onclick="reiniciar()">Jugar de nuevo</button>
    </div>

    <img id="imagen" src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Pou_from_the_Pou_video_game.png" alt="imagen" style="display:none">

    <div id="controles">
        <button id="btn-arriba">▲</button>
        <button id="btn-izq">◀</button>
        <button id="btn-der">▶</button>
        <button id="btn-abajo">▼</button>
    </div>

    <script>
        const INCREMENTO    = 20;
        const RADIO_CIRCULO = 35; // mitad de 70px
        const TOTAL_PUNTOS  = 10;
        const SRC_ORIGINAL   = "https://upload.wikimedia.org/wikipedia/commons/d/d3/Pou_from_the_Pou_video_game.png";
        const SRC_ALTERNATIVA = "https://play-lh.googleusercontent.com/H6V_UqXdT3iyCGW_NSqo1biEfu_bexVARF9UytZNS3zUxDgywlIQOGsNjMoBdi74Nzc";
        const SRC_BOMBA      = "https://cdn.vectorstock.com/i/1000v/02/61/time-bomb-on-white-background-vector-8860261.jpg";

        const imagen       = document.getElementById("imagen");
        const puntajeEl    = document.getElementById("puntaje");
        const mensajeEl    = document.getElementById("mensaje");
        const textoMensaje = document.getElementById("texto-mensaje");
        const pantallaEl   = document.getElementById("pantalla-nivel");
        const controlesEl  = document.getElementById("controles");

        let puntos = 0;
        let juegoActivo = false;
        let totalPeligrosos = 4;
        let circulos = [];

        // Genera posiciones aleatorias dentro de los límites visibles de la pantalla
        function generarPosiciones(cantidad) {
            const margen    = 80;
            const anchoMax  = window.innerWidth  - margen * 2;
            const altoMax   = window.innerHeight - margen * 2;
            const posiciones = [];
            let intentos = 0;

            while (posiciones.length < cantidad && intentos < 1000) {
                intentos++;
                const x = margen + Math.random() * anchoMax;
                const y = margen + Math.random() * altoMax;
                // Evitar solapamiento entre círculos
                const separado = posiciones.every(p => {
                    const dx = p.x - x, dy = p.y - y;
                    return Math.sqrt(dx * dx + dy * dy) > 100;
                });
                if (separado) posiciones.push({ x, y });
            }
            return posiciones;
        }

        function crearCirculos() {
            const total = TOTAL_PUNTOS + totalPeligrosos;
            const pos   = generarPosiciones(total);
            // mezclar para que los peligrosos no estén siempre al final visualmente
            const indices = [...Array(total).keys()].sort(() => Math.random() - 0.5);
            const peligrosos = new Set(indices.slice(0, totalPeligrosos));
            return pos.map((p, i) => ({
                x: p.x,
                y: p.y,
                peligroso: peligrosos.has(i),
                tocado: false,
                el: null,
            }));
        }

        function renderizarCirculos() {
            circulos.forEach((c, i) => {
                const div = document.createElement("div");
                div.classList.add("circulo");
                div.style.left = c.x + "px";
                div.style.top  = c.y + "px";
                document.body.appendChild(div);
                circulos[i].el = div;
            });
        }

        function hayInterseccion(ax, ay, aw, ah, bx, by, br) {
            return ax < bx + br * 2 && ax + aw > bx &&
                   ay < by + br * 2 && ay + ah > by;
        }

        function verificarCirculos() {
            if (!juegoActivo) return;
            const ix = imagen.offsetLeft, iy = imagen.offsetTop;
            const iw = imagen.offsetWidth, ih = imagen.offsetHeight;

            circulos.forEach(c => {
                const dentro = hayInterseccion(ix, iy, iw, ih, c.x, c.y, RADIO_CIRCULO);
                if (dentro) {
                    if (c.peligroso) {
                        c.el.classList.add("peligro");
                        imagen.src = SRC_BOMBA;
                        terminarJuego();
                    } else if (!c.tocado) {
                        c.tocado = true;
                        c.el.classList.add("activo");
                        puntos += 100;
                        puntajeEl.textContent = "Puntos: " + puntos;
                        const tocados = circulos.filter(c => !c.peligroso && c.tocado).length;
                        if (tocados === TOTAL_PUNTOS) ganarJuego();
                    }
                }
            });
        }

        function terminarJuego() {
            juegoActivo = false;
            textoMensaje.textContent = "¡Perdiste! Puntos: " + puntos;
            mensajeEl.style.display = "flex";
        }

        function ganarJuego() {
            juegoActivo = false;
            textoMensaje.textContent = "¡Ganaste! Puntos: " + puntos;
            mensajeEl.style.display = "flex";
        }

        function iniciarJuego(bombas) {
            totalPeligrosos = bombas;
            pantallaEl.style.display = "none";
            puntajeEl.style.display  = "block";
            imagen.style.display     = "block";
            controlesEl.style.display = "";  // deja que CSS lo maneje

            circulos.forEach(c => c.el && c.el.remove());
            circulos = crearCirculos();
            renderizarCirculos();

            puntos = 0;
            puntajeEl.textContent   = "Puntos: 0";
            juegoActivo             = true;
            mensajeEl.style.display = "none";

            // Posición inicial centrada
            const startX = Math.floor(window.innerWidth  / 2 - 30);
            const startY = Math.floor(window.innerHeight / 2 - 30);
            imagen.style.left    = startX + "px";
            imagen.style.top     = startY + "px";
            imagen.src           = SRC_ORIGINAL;
            imagen.style.opacity = "1";
        }

        function reiniciar() {
            mensajeEl.style.display = "none";
            iniciarJuego(totalPeligrosos);
        }

        function volverAlMenu() {
            mensajeEl.style.display   = "none";
            circulos.forEach(c => c.el && c.el.remove());
            circulos = [];
            puntajeEl.style.display   = "none";
            imagen.style.display      = "none";
            controlesEl.style.display = "none";
            pantallaEl.style.display  = "flex";
        }

        function moverDerecha()  { imagen.style.left = (imagen.offsetLeft + INCREMENTO) + "px"; }
        function moverIzquierda(){ imagen.style.left = (imagen.offsetLeft - INCREMENTO) + "px"; }
        function moverAbajo()    { imagen.style.top  = (imagen.offsetTop  + INCREMENTO) + "px"; }
        function moverArriba()   { imagen.style.top  = (imagen.offsetTop  - INCREMENTO) + "px"; }

        function verificarCambioImagen() {
            if (!juegoActivo) return;
            const x = imagen.offsetLeft, y = imagen.offsetTop;
            const w = window.innerWidth, h = window.innerHeight;
            const dentro = x < w * 0.75 && x + imagen.offsetWidth  > w * 0.5 &&
                           y < h * 0.6  && y + imagen.offsetHeight > h * 0.3;
            imagen.src = dentro ? SRC_ALTERNATIVA : SRC_ORIGINAL;
        }

        function verificarZona() {
            if (!juegoActivo) return;
            const x = imagen.offsetLeft, y = imagen.offsetTop;
            const dentro = x < 200 && x + imagen.offsetWidth > 0 &&
                           y < 200 && y + imagen.offsetHeight > 0;
            imagen.style.opacity = dentro ? "0.5" : "1";
        }

        function mover(accion) {
            if (!juegoActivo) return;
            accion();
            verificarZona();
            verificarCambioImagen();
            verificarCirculos();
        }

        document.addEventListener("keydown", e => {
            const acciones = {
                "ArrowRight": moverDerecha, "ArrowLeft": moverIzquierda,
                "ArrowDown":  moverAbajo,   "ArrowUp":   moverArriba,
            };
            if (acciones[e.key]) { e.preventDefault(); mover(acciones[e.key]); }
        });

        document.getElementById("btn-arriba").addEventListener("click", () => mover(moverArriba));
        document.getElementById("btn-abajo").addEventListener("click",  () => mover(moverAbajo));
        document.getElementById("btn-izq").addEventListener("click",    () => mover(moverIzquierda));
        document.getElementById("btn-der").addEventListener("click",    () => mover(moverDerecha));

        let touchStartX = 0, touchStartY = 0;
        document.addEventListener("touchstart", e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });
        document.addEventListener("touchend", e => {
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(dx) < 15 && Math.abs(dy) < 15) return;
            if (Math.abs(dx) > Math.abs(dy)) mover(dx > 0 ? moverDerecha : moverIzquierda);
            else mover(dy > 0 ? moverAbajo : moverArriba);
        }, { passive: true });

        // Redistribuir círculos al rotar la pantalla
        window.addEventListener("resize", () => {
            if (!juegoActivo) return;
            circulos.forEach(c => c.el && c.el.remove());
            circulos = crearCirculos();
            renderizarCirculos();
        });
    </script>
</body>
</html>
